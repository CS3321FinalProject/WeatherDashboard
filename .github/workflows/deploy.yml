name: Weather Dashboard CI

on:
  push:
    branches: ["main", "feature"]
  pull_request:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies + run tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          pip install uv
          uv sync
          pip install pytest pytest-cov

          if find tests -name "test_*.py" | grep -q .; then
            doppler run -- pytest --cov=src --cov-report=term
          else
            echo "No tests found yet — skipping test run"
          fi
