name: Weather Dashboard CI/CD

on:
  push:
    branches: ["main", "feature"]
  pull_request:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Doppler
        uses: dopplerhq/cli-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          mkdir -p coverage
          if find tests -name "test_*.py" | grep -q .; then
            doppler run -- uv run coverage run --source=src -m pytest
            doppler run -- uv run coverage lcov -o coverage/lcov.info
            doppler run -- uv run coverage report
          else
            echo "No tests found yet — skipping test run"
          fi

      - name: Enforce coverage threshold
        if: always()
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 70
          exclude: '**/__init__.py tests/**'

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t thewhimsicalknight/weather-dashboard:latest .

      - name: Push Docker image
        run: docker push thewhimsicalknight/weather-dashboard:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        with:
          host: ${{ steps.doppler.outputs.AWS_IP }}
          username: ${{ steps.doppler.outputs.AWS_EC2_USERNAME }}
          key: ${{ steps.doppler.outputs.SSH_AWS_PEM }}
          envs: DOPPLER_TOKEN
          script: |
            sudo docker rm -f weather-dashboard || true
            sudo docker pull thewhimsicalknight/weather-dashboard:latest
            sudo docker run -d --name weather-dashboard -p 80:5000 \
              -e DOPPLER_TOKEN="$DOPPLER_TOKEN" \
              thewhimsicalknight/weather-dashboard:latest

        